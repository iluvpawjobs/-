<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hi lol</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: white;
            font-size: 4rem;
            opacity: 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            animation: fadeIn 2s ease forwards, float 3s ease-in-out infinite alternate;
            transition: all 0.3s ease;
        }

        h1:hover {
            cursor: pointer;
            color: #a79dcc;
            text-shadow: 0 0 30px #a79dcc;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            from { transform: translateY(0px); }
            to { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <h1>hi lol</h1>
</body>
</html>
